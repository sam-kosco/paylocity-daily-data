name: Schedule & Hours Sync
# Repo: github.com/sam-kosco/paylocity-daily-data
# Place this file at: .github/workflows/schedule_hours_sync.yml

on:
  schedule:
    # 2:00 AM EST = 7:00 AM UTC
    - cron: '0 7 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run sync
        env:
          PAYLOCITY_CLIENT_ID:     ${{ secrets.PAYLOCITY_CLIENT_ID }}
          PAYLOCITY_CLIENT_SECRET: ${{ secrets.PAYLOCITY_CLIENT_SECRET }}
          TENANT_ID:               ${{ secrets.TENANT_ID }}
          CLIENT_ID:               ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:           ${{ secrets.CLIENT_SECRET }}
        run: python schedule_hours_sync.py
